name: Rules Production Deploy
on:
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch:  

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout production
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Processor
        run: |
          mkdir -p dist
          python scripts/process_rules.py --output_dir dist

      - name: Commit and Push to Main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/*.list
          git diff --staged --quiet || (git commit -m "Production Update $(date +'%Y-%m-%d')" && git push origin main)