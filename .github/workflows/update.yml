name: QX Rules Processor
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: rule  

      - name: Run Script
        run: |
          mkdir -p dist
          python scripts/process_rules.py

      - name: Deploy to Rule Branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dist/*.list
          # 仅当有变化时才 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update $(date +'%Y-%m-%d')" && git push origin rule)